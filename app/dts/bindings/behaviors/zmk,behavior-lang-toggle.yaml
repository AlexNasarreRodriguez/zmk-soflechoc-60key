description: Nasarre Language Toggle Behavior

compatible: "nasarre,behavior-lang-toggle"

include: zmk,behavior.yaml

properties:
  label:
    type: string
    description: Behavior label

  '#binding-cells':
    type: int
    const: 0
    description: Number of parameters

  lang-eng:
    type: string
    description: Language code for English
    required: true

  lang-esp:
    type: string
    description: Language code for Spanish
    required: true
